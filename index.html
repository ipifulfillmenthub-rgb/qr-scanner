<!DOCTYPE html>
<html>
<head>
  <title>Parcel QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 30px; }
    #reader { margin: auto; width: 300px; }
    #status { margin-top: 15px; font-size: 18px; font-weight: bold; }
    button { margin-top: 15px; padding: 10px 15px; font-size: 16px; }
  </style>
</head>
<body>
  <h2>Parcel QR Scanner</h2>
  <div id="reader"></div>
  <p id="status">Waiting for scan...</p>
  <button onclick="startScanner()">Start Scanner</button>

  <script>
    let scanner;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmPEPxrNQY2GBWMIg2oF1lX1_xtgfZuuyZUXvkVtQq8mKLJBeyHht9_-ruaZtJtJXCGA/exec";

    function startScanner() {
      document.getElementById("status").innerText = "Starting camera...";
      scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
      scanner.render(onScanSuccess);
    }

    function onScanSuccess(decodedText) {
      // Stop scanner temporarily
      scanner.clear();
      document.getElementById("status").innerText = "Logging...";

      // Send to Apps Script
      const url = SCRIPT_URL + "?id=" + encodeURIComponent(decodedText);

      fetch(url, { method: "GET", mode: "no-cors" })
        .then(() => {
          document.getElementById("status").innerText =
            "✅ Logged: " + decodedText + "\nTap 'Start Scanner' for next scan.";
        })
        .catch(() => {
          document.getElementById("status").innerText = "❌ Error logging";
        });
    }
  </script>
</body>
</html>
