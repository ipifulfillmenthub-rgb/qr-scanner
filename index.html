<script>
  let scanner;

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmPEPxrNQY2GBWMIg2oF1lX1_xtgfZuuyZUXvkVtQq8mKLJBeyHht9_-ruaZtJtJXCGA/exec";

  function startScanner() {
    document.getElementById("status").innerText = "Starting camera...";

    scanner = new Html5QrcodeScanner("reader", {
      fps: 10,
      qrbox: 250
    });

    scanner.render(onScanSuccess);
  }

  function onScanSuccess(decodedText) {
    scanner.clear();

    document.getElementById("status").innerText = "Logging...";

    const url = SCRIPT_URL + "?id=" + encodeURIComponent(decodedText);

    fetch(url, { method: "GET", mode: "no-cors" })
      .then(() => {
        document.getElementById("status").innerText =
          "✅ Logged: " + decodedText;
      })
      .catch(() => {
        document.getElementById("status").innerText = "❌ Error logging";
      });
  }
</script>
