<!DOCTYPE html>
<html>
<head>
  <title>Parcel QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin: 0; 
      padding: 0; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      background-color: #f4f4f4; 
      cursor: pointer; /* tap anywhere */
    }
    #reader { width: 300px; margin-top: 20px; }
    #status { margin-top: 15px; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body onclick="startScanner()">
  <h2>Parcel QR Scanner</h2>
  <p>Tap anywhere to start scanning</p>
  <div id="reader"></div>
  <p id="status">Waiting...</p>

  <script>
    let scanner;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmPEPxrNQY2GBWMIg2oF1lX1_xtgfZuuyZUXvkVtQq8mKLJBeyHht9_-ruaZtJtJXCGA/exec";

    function startScanner() {
      document.getElementById("status").innerText = "Starting camera...";
      
      // prevent multiple scanners
      if (scanner) {
        scanner.clear().catch(() => {});
      }

      scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
      scanner.render(onScanSuccess);
    }

    function onScanSuccess(decodedText) {
      scanner.clear();
      document.getElementById("status").innerText = "Logging...";

      const url = SCRIPT_URL + "?id=" + encodeURIComponent(decodedText);

      fetch(url, { method: "GET", mode: "no-cors" })
        .then(() => {
          document.getElementById("status").innerText =
            "✅ Logged: " + decodedText + "\nTap anywhere to scan next.";
        })
        .catch(() => {
          document.getElementById("status").innerText = "❌ Error logging";
        });
    }
  </script>
</body>
</html>
